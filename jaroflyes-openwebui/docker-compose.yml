services:

  app_proxy:
    environment:
      APP_HOST: jaroflyes-openwebui_server_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  server:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://192.168.0.7:11435
      - WEBUI_SECRET_KEY=jaroflyes-secret-key
