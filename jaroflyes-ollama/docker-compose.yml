version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: jaroflyes-ollama_proxy_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    command: |
      sh -c 'printf "events{}\nhttp{server{listen 80;location/{proxy_pass http://192.168.0.7:11435;proxy_set_header Host \$$host;proxy_set_header X-Real-IP \$$remote_addr;}}}" > /etc/nginx/nginx.conf && nginx -g "daemon off;"'
