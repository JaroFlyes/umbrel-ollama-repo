version: "3.7"

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ./data:/root/.ollama
    ports:
      - "11435:11434"   # porta interna 11434 → porta host 11435 (ajuste se quiser)

  app_proxy:
    image: umbrellabs/proxy:latest
    restart: unless-stopped
    environment:
      APP_HOST: ollama
      APP_PORT: 11434
      PROXY_AUTH_ADD: "false"
