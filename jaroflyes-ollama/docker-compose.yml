services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/data:/root/.ollama
    container_name: jaroflyes-ollama_ollama_1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

  app_proxy:
    image: getumbrel/app-proxy:v0.1.0
    restart: unless-stopped
    environment:
      APP_HOST: ollama
      APP_PORT: 11434
      PROXY_AUTH_ADD: 'false'
    container_name: jaroflyes-ollama_app_proxy_1
