version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: jaroflyes-ollama_proxy_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/nginx.conf:/etc/nginx/nginx.conf:ro

  configurator:
    image: alpine:3.18
    restart: "no"
    entrypoint: |
      sh -c '
        mkdir -p /data &&
        cat > /data/nginx.conf <<EOF
        events {}
        http {
          server {
            listen 80;
            location / {
              proxy_pass http://192.168.0.7:11435;
              proxy_set_header Host \$$host;
              proxy_set_header X-Real-IP \$$remote_addr;
            }
          }
        }
        EOF
      '
    volumes:
      - ${APP_DATA_DIR}:/data
